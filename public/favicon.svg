<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Branded favicon: a mini fretboard with the root note highlighted —
       HarmoGuitar's core visual. Teal background (#0a6b64, the accent token). -->
  <rect width="32" height="32" rx="7" fill="#0a6b64"/>
  <!-- Guitar strings (vertical, translucent white) -->
  <rect x="10" y="5" width="1.4" height="22" fill="#fff" opacity="0.45"/>
  <rect x="15.3" y="5" width="1.4" height="22" fill="#fff" opacity="0.45"/>
  <rect x="20.6" y="5" width="1.4" height="22" fill="#fff" opacity="0.45"/>
  <!-- Fret wire (horizontal) -->
  <rect x="7" y="15.5" width="18" height="1.3" fill="#fff" opacity="0.3"/>
  <!-- Root note dot (red, #c1121f — the C pitch-class color) -->
  <circle cx="16" cy="10" r="4.2" fill="#c1121f" stroke="#fff" stroke-width="1.6"/>
</svg>
